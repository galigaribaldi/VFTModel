name: Deploy VFT Reports to Pages

on:
  push:
    branches: [ main ] # Se activa cada vez que subes algo a main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. Instalamos todas las dependencias de tu proyecto desde la raíz
          pip install -r requirements.txt
          
          # 2. Instalamos jupyter-book (por si no lo tienes dentro del requirements.txt)
          pip install jupyter-book

      - name: 🏗️ Build the book
        run: |
          # Compila todo el repositorio como un libro
          jupyter-book build .

      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _build/html # Carpeta donde Jupyter Book genera la web
          branch: gh-pages    # Rama destino